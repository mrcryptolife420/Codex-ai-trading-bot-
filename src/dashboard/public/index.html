<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Desk</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <main class="main">
        <header class="topbar">
          <div class="topbar-main">
            <div class="brand-block">
            <p class="eyebrow">Codex AI Crypto Trading Bot</p>
            <h1>Trading Desk</h1>
            <p id="controlHint" class="topbar-copy">Status wordt geladen...</p>
            </div>

            <div id="operatorSummary" class="status-strip status-summary" aria-label="Belangrijkste samenvatting"></div>
          </div>

          <div class="status-strip" aria-label="Botstatus">
            <span class="status-chip" id="modeBadge">MODE</span>
            <span class="status-chip muted" id="runStateBadge">STATUS</span>
            <span class="status-chip muted" id="healthBadge">HEALTH</span>
            <span class="status-chip muted refresh-chip" id="refreshBadge">Laatste update: -</span>
          </div>

          <div class="topbar-actions">
            <button id="paperBtn" class="ghost" type="button">Paper</button>
            <button id="liveBtn" class="ghost warn" type="button">Live</button>
            <button id="refreshBtn" class="ghost" type="button">Refresh</button>
            <button id="startBtn" type="button">Start</button>
            <button id="stopBtn" class="danger" type="button">Stop</button>
          </div>
        </header>

        <section class="main-grid">
          <article class="panel collapsible-panel" id="signalsSection">
              <div class="panel-head panel-head-split">
                <div>
                  <p class="eyebrow">Beste kansen</p>
                  <h3>Top signalen</h3>
                </div>
                <div class="toolbar">
                  <input id="decisionSearch" type="search" placeholder="Zoek symbol of strategie" />
                  <label class="toggle">
                    <input id="decisionAllowedOnly" type="checkbox" />
                    Alleen tradebaar
                  </label>
                  <span id="decisionMeta" class="panel-meta"></span>
                  <button id="decisionShowMoreBtn" class="ghost ghost-small" type="button">Toon alles</button>
                  <button id="signalsToggleBtn" class="ghost ghost-small collapse-btn" type="button" aria-expanded="true" aria-controls="signalsBody">Inklappen</button>
                </div>
              </div>
              <div id="signalsBody" class="panel-body">
                <div id="decisionsList" class="list-stack"></div>
              </div>
          </article>

          <article class="panel collapsible-panel" id="positionsSection">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Actieve exposure</p>
                  <h3>Open posities</h3>
                </div>
                <button id="positionsToggleBtn" class="ghost ghost-small collapse-btn" type="button" aria-expanded="true" aria-controls="positionsBody">Inklappen</button>
              </div>
              <div id="positionsBody" class="panel-body">
                <div id="positionsList" class="list-stack"></div>
              </div>
          </article>
        </section>

        <section class="bottom-grid">
          <article class="panel collapsible-panel" id="riskSection">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Risico en herstel</p>
                  <h3>Systeemstatus</h3>
                </div>
                <button id="riskToggleBtn" class="ghost ghost-small collapse-btn" type="button" aria-expanded="true" aria-controls="riskBody">Inklappen</button>
              </div>
              <div id="riskBody" class="panel-body">
                <div id="opsSummary" class="risk-grid"></div>
                <div id="opsList" class="list-stack compact-list"></div>
              </div>
          </article>

          <article class="panel collapsible-panel" id="historySection">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Laatste afsluitingen</p>
                <h3>Recente trades</h3>
              </div>
              <button id="historyToggleBtn" class="ghost ghost-small collapse-btn" type="button" aria-expanded="true" aria-controls="historyBody">Inklappen</button>
            </div>
            <div id="historyBody" class="panel-body">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Coin</th>
                      <th>Open</th>
                      <th>Sluit</th>
                      <th>Reden</th>
                      <th>P/L</th>
                      <th>Rendement</th>
                    </tr>
                  </thead>
                  <tbody id="tradesBody"></tbody>
                </table>
              </div>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
